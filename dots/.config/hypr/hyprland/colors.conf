general {
    col.active_border = rgba(e3bdc677)
    col.inactive_border = rgba(fff0f233)
}

misc {
    background_color = rgba(1d1013FF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(fff8f8FF)
        col.text = rgba(26181bFF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(26181b), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(26181b), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(26181b), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrule = border_color rgba(754b9cAA) rgba(754b9c77), match:pin 1

general {
    col.active_border = rgba(72768b77)
    col.inactive_border = rgba(c2c5dd55)
}

misc {
    background_color = rgba(11131cFF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(faf8ffFF)
        col.text = rgba(191b25FF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(191b25), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(191b25), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(191b25), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrule = border_color rgba(006780AA) rgba(00678077), match:pin 1
